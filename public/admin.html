<!DOCTYPE html>
<html>

<head>
    <title>Escape Room Control Center</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body class="admin-body">

    <div class="admin-container">

        <h1 class="admin-title">
            ESCAPE ROOM CONTROL CENTER
        </h1>

        <div class="admin-status">
            SYSTEM STATUS: ONLINE
        </div>

        <div id="timer" class="admin-timer">
            45:00
        </div>

        <div class="button-grid">

            <button class="admin-btn start-btn"
                onclick="startTimer()">
                START
            </button>

            <button class="admin-btn pause-btn"
                onclick="pauseTimer()">
                PAUSE
            </button>

            <button class="admin-btn resume-btn"
                onclick="resumeTimer()">
                RESUME
            </button>

            <button class="admin-btn reset-btn"
                onclick="resetTimer()">
                RESET
            </button>

            <button class="admin-btn penalty-btn"
                onclick="minusFiveMinutes()">
                -5 MIN PENALTY
            </button>
        </div>

    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="admin.js"></script>

</body>

</html>
